<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nucleus Lab: Flower Dissection Experience</title>
    <style>
        :root {
            --primary: #2e7d32; /* Botanical Green */
            --secondary: #c62828; /* Hibiscus Red */
            --success: #1565c0;
            --table-top: #f5f5f5;
            --wood-trim: #5d4037;
            --petal-color: #ff5252;
            --sepal-color: #4caf50;
            --stamen-color: #ffd740;
            --pistil-color: #fff176;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: #121212; 
            overflow: hidden; 
            color: #333; 
        }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar & Journal */
        .sidebar, .notebook { 
            width: 280px; 
            background: white; 
            padding: 20px; 
            border: 1px solid #dfe6e9; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .nucleus-icon { background: var(--primary); color: white; padding: 5px 12px; border-radius: 50%; }

        .step-item { padding: 12px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #ccc; transition: 0.3s; font-size: 0.85rem; }
        .step-item.active { border-left-color: var(--secondary); background: #fff5f5; transform: translateX(5px); font-weight: 600; }
        .step-item.completed { border-left-color: var(--success); opacity: 0.7; }

        #log { flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.8rem; background: #1e1e1e; color: #a2fca2; padding: 10px; border-radius: 5px; }

        /* Workspace */
        .workspace { 
            flex: 1; 
            position: relative; 
            background-color: var(--table-top);
            background-image: radial-gradient(circle, #e0e0e0 1px, transparent 1px);
            background-size: 30px 30px;
            border-left: 10px solid var(--wood-trim);
            border-right: 10px solid var(--wood-trim);
        }

        .lab-header { padding: 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); border-bottom: 2px solid #999; }

        /* Dissection Tray */
        .tray-zone {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 350px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flower-specimen {
            width: 300px;
            height: 300px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        /* Flower Parts Classes */
        .petal { fill: var(--petal-color); transition: 0.5s; cursor: crosshair; }
        .sepal { fill: var(--sepal-color); transition: 0.5s; cursor: crosshair; }
        .stamen { fill: var(--stamen-color); transition: 0.5s; }
        .pistil { fill: var(--pistil-color); transition: 0.5s; }
        .part-removed { transform: translate(200px, -200px) rotate(45deg); opacity: 0; pointer-events: none; }

        /* Tools */
        .tool-tray { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; background: #fff; padding: 15px 40px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid var(--primary); }
        .tool { text-align: center; cursor: grab; transition: 0.3s; width: 80px;}
        .tool:hover { transform: scale(1.1) translateY(-5px); }
        .tool svg { width: 50px; height: 50px; }
        .tool span { display: block; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }

        /* Analysis Mode Overlay */
        #analysis-viewer { position: fixed; inset: 0; background: radial-gradient(circle, #1a2a1a, #050b05); z-index: 2000; display: none; color: white;}
        .viewer-layout { height: 100%; display: flex; flex-direction: column; }
        #zoom-stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .internal-ovary-view {
            width: 400px; height: 400px; border: 5px solid #fff; border-radius: 50%;
            background: #fff9c4; overflow: hidden; position: relative;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }

        .phase-footer { background: #000; padding: 25px; border-top: 3px solid var(--primary); text-align: center; }
        .btn-ui { padding: 12px 30px; border-radius: 30px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; background: white; color: #333; margin: 0 10px; }
        .btn-ui.primary { background: var(--primary); color: white; }

        /* Animations */
        @keyframes slice {
            0% { transform: scaleX(1); }
            50% { transform: scaleX(0.1); opacity: 0.5; }
            100% { transform: scaleX(1.5); opacity: 0; }
        }
        .slicing { animation: slice 0.8s forwards; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><span class="nucleus-icon">F</span> Botany Lab</div>
        <h2>Dissection Progress</h2>
        <div id="step-list"></div>
    </aside>

    <main class="workspace">
        <header class="lab-header">
            <h2 id="task-title">Lab Initialization</h2>
            <p id="task-desc">Preparing dissection instruments...</p>
        </header>

        <div class="tray-zone" id="tray">
            <div id="drop-zone" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
                <!-- Flower SVG will be injected or manipulated here -->
                <div id="flower-container"></div>
            </div>
        </div>

        <div class="tool-tray">
            <div class="tool" draggable="true" id="tool-flower">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="#ff5252"/><path d="M50 80 L50 100" stroke="green" stroke-width="5"/></svg>
                <span>Hibiscus</span>
            </div>
            <div class="tool" draggable="true" id="tool-forceps">
                <svg viewBox="0 0 100 100"><path d="M40 10 L45 90 M60 10 L55 90" stroke="#7f8c8d" stroke-width="4" fill="none"/></svg>
                <span>Forceps</span>
            </div>
            <div class="tool" draggable="true" id="tool-scalpel">
                <svg viewBox="0 0 100 100"><rect x="45" y="40" width="10" height="50" fill="#5d4037"/><path d="M45 40 L55 40 L50 10 Z" fill="#bdc3c7"/></svg>
                <span>Scalpel</span>
            </div>
        </div>
    </main>

    <aside class="notebook">
        <h3>Observer's Journal</h3>
        <div id="log"></div>
    </aside>
</div>

<div id="analysis-viewer">
    <div class="viewer-layout">
        <div id="zoom-stage">
            <!-- Dynamic Content -->
        </div>
        <div class="phase-footer">
            <h1 id="v-title">Analysis Mode</h1>
            <p id="v-desc">Internal structures revealed.</p>
            <button class="btn-ui" onclick="location.reload()">Reset Lab</button>
        </div>
    </div>
</div>

<script>
const LAB_DATA = {
    steps: [
        { id: 0, title: "Specimen Selection", instruction: "Place the Hibiscus specimen on the tray.", narration: "Welcome to the botany lab. Begin by placing the Hibiscus rosa-sinensis specimen onto your dissection tray." },
        { id: 1, title: "External Observation", instruction: "Examine the floral arrangement.", narration: "Note the bright red corolla and the prominent central stamina column. This flower is actinomorphic, meaning it has radial symmetry." },
        { id: 2, title: "Sepal Removal", instruction: "Use Forceps to remove the green sepals.", narration: "The sepals, collectively known as the calyx, protect the flower in its bud stage. Carefully remove them one by one." },
        { id: 3, title: "Petal Removal", instruction: "Carefully detach the large red petals.", narration: "Petals constitute the corolla. Their primary function is to attract pollinators like birds and insects through vivid coloration." },
        { id: 4, title: "Androecium Study", instruction: "Isolate the stamina column.", narration: "The androecium consists of numerous stamens. Each stamen has a filament and an anther containing pollen grains." },
        { id: 5, title: "Gynoecium Study", instruction: "Examine the pistil.", narration: "The gynoecium is the female reproductive part. It contains the stigma at the top, the long style, and the ovary at the base." },
        { id: 6, title: "Internal Ovary", instruction: "Use the Scalpel for a longitudinal section.", narration: "Make a precise cut through the ovary to observe the internal ovules and placentation." },
        { id: 7, title: "Final Analysis", instruction: "Review the internal anatomy.", narration: "Excellent. You can now see the ovules within the locules. This concludes the floral dissection." }
    ]
};

const FLOWER_SVG = `
<svg id="flower-specimen" viewBox="0 0 200 200">
    <g id="stems"><rect x="95" y="150" width="10" height="50" fill="#2e7d32"/></g>
    <g id="sepals">
        <path id="sepal-1" class="sepal" d="M80 150 Q70 130 95 140 Z" />
        <path id="sepal-2" class="sepal" d="M120 150 Q130 130 105 140 Z" />
    </g>
    <g id="petals">
        <path id="petal-1" class="petal" d="M100 150 Q40 120 60 60 Q100 80 100 150" />
        <path id="petal-2" class="petal" d="M100 150 Q160 120 140 60 Q100 80 100 150" />
        <path id="petal-3" class="petal" d="M100 150 Q50 40 100 20 Q150 40 100 150" />
    </g>
    <g id="reproductive">
        <rect id="pistil-style" class="pistil" x="97" y="40" width="6" height="110" />
        <circle id="stigma" class="pistil" cx="100" cy="35" r="8" />
        <g id="anthers">
            <circle class="stamen" cx="90" cy="70" r="3" /><line x1="97" y1="70" x2="90" y2="70" stroke="#ffd740" />
            <circle class="stamen" cx="110" cy="90" r="3" /><line x1="103" y1="90" x2="110" y2="90" stroke="#ffd740" />
            <circle class="stamen" cx="90" cy="110" r="3" /><line x1="97" y1="110" x2="90" y2="110" stroke="#ffd740" />
        </g>
        <ellipse id="ovary-base" class="pistil" cx="100" cy="145" r="15" ry="20" />
    </g>
</svg>`;

class FlowerLab {
    constructor() {
        this.stepIdx = 0;
        this.synth = window.speechSynthesis;
        this.removedPetals = 0;
        this.removedSepals = 0;
        this.init();
    }

    init() {
        this.renderStepList();
        this.setupInteractions();
        this.updateStepUI();
    }

    renderStepList() {
        document.getElementById('step-list').innerHTML = LAB_DATA.steps.map((s, i) => `
            <div class="step-item" id="step-${i}">${s.title}</div>
        `).join('');
    }

    updateStepUI() {
        const step = LAB_DATA.steps[this.stepIdx];
        document.getElementById('task-title').textContent = step.title;
        document.getElementById('task-desc').textContent = step.instruction;
        document.querySelectorAll('.step-item').forEach((el, i) => {
            el.className = 'step-item' + (i === this.stepIdx ? ' active' : i < this.stepIdx ? ' completed' : '');
        });
        this.speak(step.narration);
    }

    speak(text) {
        this.synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        this.synth.speak(utterance);
    }

    log(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    setupInteractions() {
        document.addEventListener('dragstart', e => { e.dataTransfer.setData('text', e.target.id); });
        
        const tray = document.getElementById('tray');
        tray.addEventListener('dragover', e => e.preventDefault());
        tray.addEventListener('drop', e => {
            e.preventDefault();
            this.handleAction(e.dataTransfer.getData('text'));
        });
    }

    handleAction(toolId) {
        if (this.stepIdx === 0 && toolId === 'tool-flower') {
            document.getElementById('flower-container').innerHTML = FLOWER_SVG;
            this.log("Specimen: Hibiscus rosa-sinensis mounted.");
            this.advanceStep();
        } 
        else if (this.stepIdx === 1) {
            this.log("External whorls observed.");
            this.advanceStep();
        }
        else if (this.stepIdx === 2 && toolId === 'tool-forceps') {
            const sepals = document.querySelectorAll('.sepal:not(.part-removed)');
            if(sepals.length > 0) {
                sepals[0].classList.add('part-removed');
                this.removedSepals++;
                this.log(`Sepal ${this.removedSepals} removed.`);
                if(this.removedSepals >= 2) this.advanceStep();
            }
        }
        else if (this.stepIdx === 3 && toolId === 'tool-forceps') {
            const petals = document.querySelectorAll('.petal:not(.part-removed)');
            if(petals.length > 0) {
                petals[0].classList.add('part-removed');
                this.removedPetals++;
                this.log(`Petal ${this.removedPetals} removed.`);
                if(this.removedPetals >= 3) this.advanceStep();
            }
        }
        else if (this.stepIdx === 4 && toolId === 'tool-forceps') {
            document.getElementById('anthers').classList.add('part-removed');
            this.log("Androecium isolated for inspection.");
            this.advanceStep();
        }
        else if (this.stepIdx === 5) {
            this.log("Gynoecium (Pistil) structure verified.");
            this.advanceStep();
        }
        else if (this.stepIdx === 6 && toolId === 'tool-scalpel') {
            const ovary = document.getElementById('ovary-base');
            ovary.classList.add('slicing');
            this.log("Ovary sectioned longitudinally.");
            setTimeout(() => this.showAnalysis(), 1000);
        }
    }

    advanceStep() {
        this.stepIdx++;
        this.updateStepUI();
    }

    showAnalysis() {
        const viewer = document.getElementById('analysis-viewer');
        const stage = document.getElementById('zoom-stage');
        viewer.style.display = 'block';
        
        stage.innerHTML = `
            <div class="internal-ovary-view">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M50 10 Q90 50 50 90 Q10 50 50 10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
                    <line x1="50" y1="10" x2="50" y2="90" stroke="#2e7d32" stroke-dasharray="2"/>
                    <!-- Ovules -->
                    <circle cx="40" cy="30" r="4" fill="#81c784" />
                    <circle cx="40" cy="50" r="4" fill="#81c784" />
                    <circle cx="40" cy="70" r="4" fill="#81c784" />
                    <circle cx="60" cy="30" r="4" fill="#81c784" />
                    <circle cx="60" cy="50" r="4" fill="#81c784" />
                    <circle cx="60" cy="70" r="4" fill="#81c784" />
                    <text x="25" y="95" fill="#2e7d32" font-size="5" font-weight="bold">SECTION: TRANSVERSE OVARY</text>
                </svg>
            </div>
            <div style="margin-left: 40px; max-width: 400px;">
                <h3>Anatomical Checklist</h3>
                <ul>
                    <li>Locules: 5 (Syncarpous)</li>
                    <li>Placentation: Axile</li>
                    <li>Ovules: Visible/White</li>
                </ul>
            </div>
        `;
        this.stepIdx = 7;
        this.updateStepUI();
    }
}

const lab = new FlowerLab();

// Handle clicks for observation step
document.addEventListener('click', (e) => {
    if(lab.stepIdx === 1 || lab.stepIdx === 5) {
        if(e.target.classList.contains('petal') || e.target.classList.contains('pistil')) {
            lab.handleAction();
        }
    }
});
</script>
</body>
</html>
