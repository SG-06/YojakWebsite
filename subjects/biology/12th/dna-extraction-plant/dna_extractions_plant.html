<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genetics Lab: DNA Extraction Virtual Experience</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e74c3c;
            --success: #27ae60;
            --table-top: #cfd8dc;
            --wood-trim: #4e342e;
            --dna-color: #ecf0f1;
            --buffer-color: rgba(52, 152, 219, 0.4);
            --ethanol-color: rgba(236, 240, 241, 0.6);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: #2c3e50; 
            overflow: hidden; 
            color: #333; 
        }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar & Journal */
        .sidebar, .notebook { 
            width: 280px; 
            background: white; 
            padding: 20px; 
            border: 1px solid #dfe6e9; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .dna-icon { background: var(--secondary); color: white; padding: 5px 12px; border-radius: 50%; font-family: monospace; }

        .step-item { padding: 12px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #ccc; transition: 0.3s; font-size: 0.85rem; }
        .step-item.active { border-left-color: var(--secondary); background: #fff5f5; transform: translateX(5px); font-weight: 600; }
        .step-item.completed { border-left-color: var(--success); opacity: 0.7; }

        #log { flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.8rem; background: #1e1e1e; color: #00ff00; padding: 10px; border-radius: 5px; }

        /* Workspace / Lab Table */
        .workspace { 
            flex: 1; 
            position: relative; 
            background-color: var(--table-top);
            background-image: linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px),
                              linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            border-left: 10px solid var(--wood-trim);
            border-right: 10px solid var(--wood-trim);
        }

        .lab-header { padding: 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); border-bottom: 2px solid #999; }

        /* Main Lab Station */
        .lab-station {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        #work-target {
            width: 200px;
            height: 250px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* Dynamic SVG Containers */
        .equipment {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: none;
            transition: all 0.5s;
        }
        .equipment.active { display: block; }

        #mortar-content, #tube-liquid, #dna-precipitate { transition: all 1s ease-in-out; }

        /* Tools Tray */
        .tool-tray { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; background: #fff; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid var(--primary); }
        .tool { text-align: center; cursor: grab; transition: 0.3s; width: 70px; }
        .tool:hover { transform: scale(1.1) translateY(-5px); }
        .tool svg { width: 50px; height: 50px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        .tool span { display: block; font-size: 0.7rem; font-weight: bold; margin-top: 5px; line-height: 1.1; }

        .tool.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        /* UI Buttons */
        .btn-ui { padding: 12px 30px; border-radius: 30px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; background: white; color: #333; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-ui:hover { transform: scale(1.05); }
        .btn-ui.primary { background: var(--secondary); color: white; }
        
        #btn-analyze { position: absolute; top: 120px; right: 40px; display: none; animation: pulse-btn 2s infinite; }
        @keyframes pulse-btn { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }

        /* Molecular Animation Viewer */
        #molecular-viewer { position: fixed; inset: 0; background: #111; z-index: 2000; display: none; }
        .viewer-layout { height: 100%; display: flex; flex-direction: column; }
        
        #molecular-stage { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Molecular Elements */
        .lipid-bilayer { position: absolute; width: 600px; height: 600px; border: 15px dashed #f39c12; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 3s ease; }
        .nucleus-membrane { position: absolute; width: 300px; height: 300px; border: 8px dashed #9b59b6; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 3s ease; }
        
        .dna-helix { position: absolute; width: 60px; height: 180px; transition: all 3s cubic-bezier(0.25, 0.1, 0.25, 1); opacity: 1; }
        .dna-helix svg { width: 100%; height: 100%; }

        .detergent-molecule { position: absolute; width: 20px; height: 40px; opacity: 0; transition: all 2s; }
        .detergent-head { width: 20px; height: 20px; background: #3498db; border-radius: 50%; }
        .detergent-tail { width: 4px; height: 20px; background: #bdc3c7; margin: 0 auto; }

        .ethanol-wave { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background: rgba(236, 240, 241, 0.1); opacity: 0; transition: opacity 3s; pointer-events: none; z-index: 10; backdrop-filter: blur(2px); }

        .dna-clump { position: absolute; opacity: 0; filter: blur(1px); background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; transition: all 4s ease-in-out; z-index: 20; }

        /* Viewer UI */
        .phase-footer { background: rgba(0,0,0,0.85); padding: 30px; border-top: 2px solid var(--secondary); text-align: center; z-index: 30; position: relative; }
        #v-title { color: #fff; margin: 0 0 10px 0; font-size: 2rem; letter-spacing: 3px; text-transform: uppercase; }
        #v-desc { color: #dfe6e9; max-width: 900px; margin: 0 auto 20px auto; font-size: 1.1rem; min-height: 3.3em; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><span class="dna-icon">🧬</span> Genetics Lab</div>
        <h2>Lab Progress</h2>
        <div id="step-list"></div>
    </aside>

    <main class="workspace">
        <header class="lab-header">
            <h2 id="task-title">Lab Initialization</h2>
            <p id="task-desc">Loading experimental setup...</p>
        </header>

        <button id="btn-fullscreen" class="btn-ui" onclick="lab.toggleFullscreen()" style="position: absolute; top: 15px; right: 25px; z-index: 1000; margin: 0; padding: 8px 15px; font-size: 0.8rem; background: #7f8c8d; color: white;">FULLSCREEN</button>
        <button id="btn-analyze" class="btn-ui primary" onclick="lab.startMolecularAnalysis()">View Molecular Process</button>

        <div class="lab-station" id="station-dropzone">
            <div id="work-target">
                <div id="eq-mortar" class="equipment active">
                    <svg viewBox="0 0 200 250">
                        <path d="M 40 200 Q 100 250 160 200 L 180 140 L 20 140 Z" fill="#7f8c8d" />
                        <path d="M 20 140 Q 100 160 180 140 Q 100 120 20 140 Z" fill="#95a5a6" />
                        <ellipse id="mortar-content" cx="100" cy="140" rx="70" ry="15" fill="transparent" />
                        <path id="pestle" d="M 130 50 L 110 160 L 90 160 L 110 50 Z" fill="#ecf0f1" opacity="0.8" />
                    </svg>
                </div>
                
                <div id="eq-tube" class="equipment">
                    <svg viewBox="0 0 200 250">
                        <rect x="50" y="220" width="100" height="15" fill="#e67e22" />
                        <rect x="60" y="100" width="10" height="120" fill="#d35400" />
                        <rect x="130" y="100" width="10" height="120" fill="#d35400" />
                        <rect x="60" y="120" width="80" height="10" fill="#e67e22" />
                        
                        <rect x="85" y="80" width="30" height="130" rx="15" fill="rgba(255,255,255,0.4)" stroke="#bdc3c7" stroke-width="2" />
                        <rect id="tube-liquid" x="87" y="200" width="26" height="0" rx="10" fill="#e74c3c" opacity="0.7" />
                        <rect id="dna-precipitate" x="87" y="150" width="26" height="0" fill="var(--ethanol-color)" />
                        <path id="spooled-dna" d="M 90 155 Q 100 145 110 155 Q 100 165 90 155 Z" fill="#fff" opacity="0" filter="blur(1px)"/>
                        
                        <path id="funnel" d="M 70 30 L 130 30 L 105 70 L 105 90 L 95 90 L 95 70 Z" fill="rgba(255,255,255,0.7)" stroke="#ccc" opacity="0" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="tool-tray">
            <div class="tool" draggable="true" id="tool-strawberry">
                <svg viewBox="0 0 100 100">
                    <path d="M50 90 C 20 80 20 30 50 20 C 80 30 80 80 50 90 Z" fill="#e74c3c"/>
                    <path d="M50 20 C 40 10 30 20 40 30 C 50 20 60 30 70 20 C 60 10 50 20 50 20 Z" fill="#27ae60"/>
                    <circle cx="40" cy="50" r="2" fill="#f1c40f"/><circle cx="60" cy="60" r="2" fill="#f1c40f"/><circle cx="50" cy="75" r="2" fill="#f1c40f"/>
                </svg>
                <span>Strawberry</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-buffer">
                <svg viewBox="0 0 100 100">
                    <rect x="35" y="40" width="30" height="50" rx="5" fill="#ecf0f1" stroke="#95a5a6"/>
                    <rect x="37" y="60" width="26" height="28" fill="#3498db" opacity="0.6"/>
                    <rect x="42" y="20" width="16" height="20" fill="#95a5a6"/>
                    <text x="50" y="75" font-size="12" text-anchor="middle" fill="#fff" font-family="sans-serif">Lysis</text>
                </svg>
                <span>Lysis Buffer</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-filter">
                <svg viewBox="0 0 100 100">
                    <path d="M20 20 L80 20 L55 60 L55 90 L45 90 L45 60 Z" fill="rgba(255,255,255,0.8)" stroke="#7f8c8d"/>
                    <path d="M30 20 L70 20 L50 50 Z" fill="#f1c40f" opacity="0.5"/>
                </svg>
                <span>Filter Setup</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-ethanol">
                <svg viewBox="0 0 100 100">
                    <rect x="30" y="30" width="40" height="60" rx="10" fill="rgba(255,255,255,0.5)" stroke="#7f8c8d"/>
                    <path d="M32 60 L68 60 L68 88 L32 88 Z" fill="#95a5a6" opacity="0.4"/>
                    <text x="50" y="75" font-size="10" text-anchor="middle" fill="#333">ICE</text>
                    <rect x="40" y="10" width="20" height="20" fill="#34495e"/>
                </svg>
                <span>Cold Ethanol</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-rod">
                <svg viewBox="0 0 100 100">
                    <rect x="45" y="10" width="10" height="80" rx="5" fill="#bdc3c7" stroke="#7f8c8d"/>
                </svg>
                <span>Glass Rod</span>
            </div>
        </div>
    </main>

    <aside class="notebook">
        <h3>Lab Journal</h3>
        <div id="log"></div>
    </aside>
</div>

<div id="molecular-viewer">
    <div class="viewer-layout">
        <div id="molecular-stage">
            <div class="ethanol-wave" id="eth-wave"></div>
            
            <div class="lipid-bilayer" id="cell-membrane">
                <div class="nucleus-membrane" id="nucleus">
                    <div class="dna-helix" id="dna-1" style="left: 30%; top: 20%;">
                        <svg viewBox="0 0 50 150">
                            <path d="M10 10 Q25 40 40 75 T10 140" fill="none" stroke="#ecf0f1" stroke-width="4"/>
                            <path d="M40 10 Q25 40 10 75 T40 140" fill="none" stroke="#bdc3c7" stroke-width="4"/>
                            <line x1="15" y1="25" x2="35" y2="25" stroke="#e74c3c" stroke-width="2"/>
                            <line x1="10" y1="50" x2="40" y2="50" stroke="#3498db" stroke-width="2"/>
                            <line x1="15" y1="125" x2="35" y2="125" stroke="#2ecc71" stroke-width="2"/>
                            <line x1="10" y1="100" x2="40" y2="100" stroke="#f1c40f" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="dna-helix" id="dna-2" style="left: 60%; top: 30%; transform: scale(0.8) rotate(20deg);">
                        <svg viewBox="0 0 50 150">
                            <path d="M10 10 Q25 40 40 75 T10 140" fill="none" stroke="#ecf0f1" stroke-width="4"/>
                            <path d="M40 10 Q25 40 10 75 T40 140" fill="none" stroke="#bdc3c7" stroke-width="4"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div id="detergent-layer"></div>
        </div>
        
        <div class="phase-footer">
            <h1 id="v-title">CELLULAR VIEW</h1>
            <p id="v-desc">Initial state...</p>
            <div id="controls-row">
                <button class="btn-ui primary" id="btn-next-phase" onclick="lab.advanceMolecularPhase()">NEXT PHASE</button>
                <button class="btn-ui" onclick="location.reload()">RESTART LAB</button>
            </div>
        </div>
    </div>
</div>

<script>
const LAB_DATA = {
    steps: [
        { id: 0, tool: 'tool-strawberry', title: "Mechanical Breakdown", instruction: "Drag the Strawberry to the mortar to mash it.", narration: "First, we must physically break apart the plant tissue to increase the surface area." },
        { id: 1, tool: 'tool-buffer', title: "Cell Lysis", instruction: "Add the Lysis Buffer to break down cell membranes.", narration: "The lysis buffer contains detergent to dissolve lipid membranes, and salt to help DNA clump." },
        { id: 2, tool: 'tool-filter', title: "Filtration", instruction: "Use the filter to separate the liquid from the cellular debris.", narration: "Filtering removes the large cell wall debris and organelles, leaving dissolved DNA and proteins in the liquid." },
        { id: 3, tool: 'tool-ethanol', title: "DNA Precipitation", instruction: "Carefully pour ice-cold ethanol into the test tube.", narration: "DNA is insoluble in alcohol. The cold ethanol causes the DNA to precipitate out of the solution." },
        { id: 4, tool: 'tool-rod', title: "DNA Spooling", instruction: "Use the glass rod to spool and extract the DNA.", narration: "The visible white, stringy substance at the alcohol interface is pure DNA. You can now spool it." }
    ]
};

class DnaLab {
    constructor() {
        this.stepIdx = 0;
        this.molecularPhase = 0;
        this.synth = window.speechSynthesis;
        this.init();
    }

    init() {
        this.renderStepList();
        this.setupInteractions();
        this.updateStepUI();
    }

    playSound(freq, type = 'sine', duration = 0.15) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    }

    renderStepList() {
        const container = document.getElementById('step-list');
        container.innerHTML = LAB_DATA.steps.map((s, i) => `
            <div class="step-item" id="step-${i}">${s.title}</div>
        `).join('');
    }

    updateStepUI() {
        if(this.stepIdx >= LAB_DATA.steps.length) return;
        
        const step = LAB_DATA.steps[this.stepIdx];
        document.getElementById('task-title').textContent = step.title;
        document.getElementById('task-desc').textContent = step.instruction;
        
        // Update Step List Styles
        document.querySelectorAll('.step-item').forEach((el, i) => {
            el.className = 'step-item' + (i === this.stepIdx ? ' active' : i < this.stepIdx ? ' completed' : '');
        });

        // Enable Current Tool
        document.querySelectorAll('.tool').forEach(t => t.classList.add('disabled'));
        document.getElementById(step.tool).classList.remove('disabled');

        this.speak(step.narration);
    }

    speak(text, callback) {
        this.synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.onend = () => { if(callback) callback(); };
        this.synth.speak(utterance);
    }

    log(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    setupInteractions() {
        // Drag functionality
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('dragstart', e => {
                if(!tool.classList.contains('disabled')) {
                    e.dataTransfer.setData('text', e.target.id);
                }
            });
        });

        const dropzone = document.getElementById('station-dropzone');
        dropzone.addEventListener('dragover', e => e.preventDefault());
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            const toolId = e.dataTransfer.getData('text');
            const expectedTool = LAB_DATA.steps[this.stepIdx]?.tool;
            
            if (toolId === expectedTool) {
                this.handleAction(toolId);
            }
        });
    }

    handleAction(toolId) {
        this.playSound(500, 'triangle');
        
        if (this.stepIdx === 0 && toolId === 'tool-strawberry') {
            document.getElementById('mortar-content').setAttribute('fill', '#e74c3c'); // Red mash
            this.log("Strawberry added and mashed.");
            this.advanceStep();
        } 
        else if (this.stepIdx === 1 && toolId === 'tool-buffer') {
            document.getElementById('mortar-content').setAttribute('fill', '#9b59b6'); // Purple mixed
            this.log("Lysis buffer added. Cell membranes breaking.");
            this.advanceStep();
        } 
        else if (this.stepIdx === 2 && toolId === 'tool-filter') {
            document.getElementById('eq-mortar').classList.remove('active');
            document.getElementById('eq-tube').classList.add('active');
            document.getElementById('funnel').style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('tube-liquid').setAttribute('y', '150');
                document.getElementById('tube-liquid').setAttribute('height', '50');
            }, 500);

            setTimeout(() => { document.getElementById('funnel').style.opacity = '0'; }, 1500);
            this.log("Solution filtered into test tube.");
            this.advanceStep();
        } 
        else if (this.stepIdx === 3 && toolId === 'tool-ethanol') {
            document.getElementById('dna-precipitate').setAttribute('y', '110');
            document.getElementById('dna-precipitate').setAttribute('height', '40');
            
            setTimeout(() => {
                document.getElementById('spooled-dna').style.opacity = '1';
            }, 1000);
            
            this.log("Ice-cold ethanol added. DNA precipitating.");
            this.advanceStep();
        }
        else if (this.stepIdx === 4 && toolId === 'tool-rod') {
            document.getElementById('spooled-dna').setAttribute('d', 'M 90 90 Q 100 80 110 90 Q 100 130 90 90 Z');
            this.log("DNA extracted successfully!");
            
            // Lab Complete on bench scale
            this.stepIdx++;
            document.getElementById('task-title').textContent = "Extraction Complete";
            document.getElementById('task-desc').textContent = "You have successfully extracted macro-level DNA. Click 'View Molecular Process' to see what happened inside the beaker.";
            document.getElementById('btn-analyze').style.display = 'block';
            this.playSound(800, 'sine', 0.5);
            this.speak("Extraction complete. Let's observe the molecular changes that occurred during this process.");
        }
    }

    advanceStep() {
        this.stepIdx++;
        setTimeout(() => this.updateStepUI(), 500);
    }

    /* --- Molecular Animation Sequence --- */

    async startMolecularAnalysis() {
        document.getElementById('btn-analyze').style.display = 'none';
        document.getElementById('molecular-viewer').style.display = 'block';
        
        this.molecularPhase = 0;
        this.advanceMolecularPhase();
    }

    generateDetergent() {
        const layer = document.getElementById('detergent-layer');
        for(let i=0; i<30; i++) {
            const det = document.createElement('div');
            det.className = 'detergent-molecule';
            det.innerHTML = `<div class="detergent-head"></div><div class="detergent-tail"></div>`;
            det.style.left = (Math.random() * 80 + 10) + '%';
            det.style.top = (Math.random() * 80 + 10) + '%';
            det.style.transform = `rotate(${Math.random() * 360}deg)`;
            layer.appendChild(det);
        }
    }

    async advanceMolecularPhase() {
        const title = document.getElementById('v-title');
        const desc = document.getElementById('v-desc');
        const btn = document.getElementById('btn-next-phase');

        if(this.molecularPhase === 0) {
            // Phase 1: Intact Cell
            title.textContent = "Intact Plant Cell";
            desc.textContent = "Inside the mashed strawberry, individual cells remain. The DNA is protected inside the nucleus, which is inside the cell membrane.";
            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        } 
        else if (this.molecularPhase === 1) {
            // Phase 2: Action of Lysis Buffer (Detergent)
            title.textContent = "Lysis Buffer Action";
            desc.textContent = "The detergent molecules in the lysis buffer bind to the lipids in the cell and nuclear membranes, breaking them apart and releasing the DNA.";
            
            this.generateDetergent();
            setTimeout(() => {
                document.querySelectorAll('.detergent-molecule').forEach(d => d.style.opacity = '1');
            }, 500);

            setTimeout(() => {
                document.getElementById('cell-membrane').style.borderWidth = '0px';
                document.getElementById('cell-membrane').style.transform = 'scale(1.2)';
                document.getElementById('nucleus').style.borderWidth = '0px';
                document.getElementById('nucleus').style.transform = 'scale(1.2)';
            }, 2000);

            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        }
        else if (this.molecularPhase === 2) {
            // Phase 3: Salt effect (implicit) & DNA floating
            title.textContent = "DNA Released";
            desc.textContent = "The DNA is now free-floating in the aqueous solution. The salt added earlier neutralizes the negative charge of the DNA, allowing the strands to come closer together.";
            
            document.querySelectorAll('.detergent-molecule').forEach(d => d.style.opacity = '0');
            
            document.getElementById('dna-1').style.transform = 'translate(-100px, 50px) rotate(45deg)';
            document.getElementById('dna-2').style.transform = 'translate(100px, -50px) rotate(-45deg)';

            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        }
        else if (this.molecularPhase === 3) {
            // Phase 4: Ethanol Precipitation
            title.textContent = "Ethanol Precipitation";
            desc.textContent = "Because DNA is insoluble in cold alcohol, adding ethanol causes the DNA strands to clump together and precipitate out of the liquid, forming the white web-like structure we extracted.";
            
            btn.textContent = "FINISH LAB";
            document.getElementById('eth-wave').style.opacity = '1';

            // Clump DNA
            setTimeout(() => {
                document.getElementById('dna-1').style.transform = 'translate(0px, 0px) rotate(0deg) scale(0.5)';
                document.getElementById('dna-1').style.opacity = '0';
                document.getElementById('dna-2').style.transform = 'translate(0px, 0px) rotate(0deg) scale(0.5)';
                document.getElementById('dna-2').style.opacity = '0';
                
                // Create clump
                const clump = document.createElement('div');
                clump.className = 'dna-clump';
                clump.style.width = '100px';
                clump.style.height = '100px';
                document.getElementById('molecular-stage').appendChild(clump);
                
                setTimeout(() => { clump.style.opacity = '0.9'; }, 500);
            }, 1000);

            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        }
        else {
            alert("Genetics Lab Complete: You have mastered DNA Extraction!");
            location.reload();
        }
    }

    waitSpeak(text) {
        return new Promise(resolve => {
            this.speak(text, resolve);
        });
    }
}

// Fullscreen Native Integration Method
DnaLab.prototype.toggleFullscreen = function() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.error(`Error attempting to enable fullscreen: ${err.message}`);
        });
        document.getElementById('btn-fullscreen').textContent = "EXIT FULLSCREEN";
    } else {
        document.exitFullscreen();
        document.getElementById('btn-fullscreen').textContent = "FULLSCREEN";
    }
};

// Initialize Lab
const lab = new DnaLab();
