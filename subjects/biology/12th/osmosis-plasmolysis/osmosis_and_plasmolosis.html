<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Biology Lab: Osmosis & Plasmolysis Virtual Experience</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #8e44ad;
            --success: #27ae60;
            --table-top: #cfd8dc;
            --wood-trim: #5d4037;
            --onion-purple: #9b59b6;
            --water-blue: #3498db;
            --salt-gray: #ecf0f1;
            --cell-wall: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: #2c3e50; 
            overflow: hidden; 
            color: #333; 
        }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar & Journal */
        .sidebar, .notebook { 
            width: 280px; 
            background: white; 
            padding: 20px; 
            border: 1px solid #dfe6e9; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .cell-icon { background: var(--secondary); color: white; padding: 5px 12px; border-radius: 30%; font-size: 1.2rem; }

        .step-item { padding: 12px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #ccc; transition: 0.3s; font-size: 0.85rem; }
        .step-item.active { border-left-color: var(--secondary); background: #f5eef8; transform: translateX(5px); font-weight: 600; }
        .step-item.completed { border-left-color: var(--success); opacity: 0.7; }

        #log { flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.8rem; background: #1e1e1e; color: #00ff00; padding: 10px; border-radius: 5px; }

        /* Workspace / Lab Table */
        .workspace { 
            flex: 1; 
            position: relative; 
            background-color: var(--table-top);
            background-image: radial-gradient(circle, #b0bec5 1px, transparent 1px);
            background-size: 30px 30px;
            border-left: 10px solid var(--wood-trim);
            border-right: 10px solid var(--wood-trim);
        }

        .lab-header { padding: 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); border-bottom: 2px solid #999; }

        /* Microscope Slide Setup */
        .slide-zone {
            position: absolute;
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 250px;
            border: 3px dashed #7f8c8d;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
        }

        #glass-slide { 
            width: 300px; 
            height: 100px; 
            background: rgba(240, 248, 255, 0.4); 
            border: 1px solid rgba(255,255,255,0.9);
            position: relative; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-content-wrapper { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        
        #onion-peel { width: 50px; height: 50px; background: rgba(155, 89, 182, 0.5); border: 1px solid #8e44ad; display: none; z-index: 1; border-radius: 5px; }
        #water-drop { position: absolute; width: 60px; height: 60px; background: rgba(52, 152, 219, 0.3); border-radius: 50%; display: none; z-index: 2; filter: blur(2px); }
        #salt-drop { position: absolute; width: 60px; height: 60px; background: rgba(236, 240, 241, 0.6); border-radius: 50%; display: none; z-index: 2; filter: blur(1px); }
        #cover-slip { width: 70px; height: 70px; border: 1px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.2); display: none; z-index: 3; position: absolute; }

        /* Tools */
        .tool-tray { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; background: #fff; padding: 15px 40px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid var(--primary); }
        .tool { text-align: center; cursor: grab; transition: 0.3s; width: 75px; }
        .tool:hover { transform: scale(1.1) translateY(-5px); }
        .tool svg { width: 50px; height: 50px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        .tool span { display: block; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .tool.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        /* UI Buttons */
        .btn-ui { padding: 12px 30px; border-radius: 30px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; background: white; color: #333; margin: 0 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-ui:hover { transform: scale(1.1); }
        .btn-ui.primary { background: var(--secondary); color: white; }

        #btn-analyze { position: absolute; top: 120px; right: 40px; display: none; animation: pulse-btn 2s infinite; }
        @keyframes pulse-btn { 0% { box-shadow: 0 0 0 0 rgba(142, 68, 173, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(142, 68, 173, 0); } 100% { box-shadow: 0 0 0 0 rgba(142, 68, 173, 0); } }

        /* Molecular View (Cell Animation) */
        #molecular-viewer { position: fixed; inset: 0; background: #111; z-index: 2000; display: none; }
        .viewer-layout { height: 100%; display: flex; flex-direction: column; }
        
        #cell-stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2c3e50, #000); overflow: hidden;}
        
        /* The Plant Cell */
        #plant-cell {
            position: relative;
            width: 500px;
            height: 300px;
            border: 15px solid var(--cell-wall);
            border-radius: 20px;
            background: rgba(39, 174, 96, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cytoplasm & Cell Membrane */
        #cell-membrane {
            position: absolute;
            width: 480px;
            height: 280px;
            background: rgba(155, 89, 182, 0.3);
            border: 4px solid var(--onion-purple);
            border-radius: 10px;
            transition: all 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Central Vacuole */
        #central-vacuole {
            width: 350px;
            height: 180px;
            background: rgba(52, 152, 219, 0.5);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            transition: all 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.3);
        }

        #nucleus {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #8e44ad;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Particles */
        .particle { position: absolute; border-radius: 50%; opacity: 0; z-index: 10; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .p-water { width: 15px; height: 15px; background: var(--water-blue); box-shadow: 0 0 5px var(--water-blue); color: white; }

        /* Viewer UI */
        .phase-footer { background: rgba(0,0,0,0.85); padding: 30px; border-top: 2px solid var(--secondary); text-align: center; }
        #v-title { color: #fff; margin: 0 0 10px 0; font-size: 2rem; letter-spacing: 3px; text-transform: uppercase; }
        #v-desc { color: #dfe6e9; max-width: 900px; margin: 0 auto 20px auto; font-size: 1.1rem; min-height: 3.3em; }

        .solution-label { position: absolute; top: 40px; right: 60px; color: white; font-size: 1.2rem; font-weight: bold; font-family: monospace; padding: 10px 20px; border-radius: 10px; border: 2px dashed #3498db; background: rgba(52, 152, 219, 0.3); transition: 1s; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><span class="cell-icon">🔬</span> Bio Lab</div>
        <h2>Experiment Progress</h2>
        <div id="step-list"></div>
    </aside>

    <main class="workspace">
        <header class="lab-header">
            <h2 id="task-title">Lab Initialization</h2>
            <p id="task-desc">Loading experimental setup...</p>
        </header>

        <button id="btn-analyze" class="btn-ui primary" onclick="lab.startMolecularAnalysis()">Observe Under Microscope</button>

        <div class="slide-zone" id="slide-dropzone">
            <div id="glass-slide">
                <div class="slide-content-wrapper">
                    <div id="onion-peel"></div>
                    <div id="water-drop"></div>
                    <div id="salt-drop"></div>
                    <div id="cover-slip"></div>
                </div>
            </div>
        </div>

        <div class="tool-tray">
            <div class="tool" draggable="true" id="tool-forceps">
                <svg viewBox="0 0 100 100">
                    <path d="M20 90 Q40 50 45 20 L55 20 Q60 50 80 90" stroke="#7f8c8d" stroke-width="6" fill="none"/>
                    <rect x="40" y="10" width="20" height="15" fill="#34495e"/>
                </svg>
                <span>Forceps (Onion)</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-water">
                <svg viewBox="0 0 100 100">
                    <path d="M40 50 L40 80 Q50 100 60 80 L60 50 Z" fill="#ecf0f1" stroke="#bdc3c7"/>
                    <circle cx="50" cy="25" r="15" fill="#3498db"/>
                    <path d="M42 60 L58 60 L58 75 L42 75 Z" fill="#3498db" opacity="0.6"/>
                    <text x="50" y="70" font-size="10" text-anchor="middle" font-weight="bold" fill="#fff">H2O</text>
                </svg>
                <span>Distilled Water</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-slip">
                <svg viewBox="0 0 100 100">
                    <rect x="25" y="35" width="50" height="50" fill="rgba(255,255,255,0.5)" stroke="#999" stroke-width="2"/>
                    <line x1="25" y1="35" x2="35" y2="45" stroke="#fff" stroke-width="2"/>
                </svg>
                <span>Cover Slip</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-salt">
                <svg viewBox="0 0 100 100">
                    <path d="M40 50 L40 80 Q50 100 60 80 L60 50 Z" fill="#ecf0f1" stroke="#bdc3c7"/>
                    <circle cx="50" cy="25" r="15" fill="#e74c3c"/>
                    <path d="M42 60 L58 60 L58 75 L42 75 Z" fill="#ecf0f1"/>
                    <text x="50" y="70" font-size="10" text-anchor="middle" font-weight="bold">NaCl</text>
                </svg>
                <span>5% NaCl Solution</span>
            </div>
        </div>
    </main>

    <aside class="notebook">
        <h3>Lab Journal</h3>
        <div id="log"></div>
    </aside>
</div>

<div id="molecular-viewer">
    <div class="viewer-layout">
        <div id="cell-stage">
            <div class="solution-label" id="sol-label">Environment: Hypotonic (Distilled Water)</div>
            
            <div id="plant-cell">
                <div id="cell-membrane">
                    <div id="nucleus"></div>
                    <div id="central-vacuole"></div>
                </div>
            </div>
        </div>
        
        <div class="phase-footer">
            <h1 id="v-title">PHASE</h1>
            <p id="v-desc">Initial state...</p>
            <div id="controls-row">
                <button class="btn-ui primary" id="btn-next-phase" onclick="lab.advanceMolecularPhase()">NEXT PHASE</button>
                <button class="btn-ui" onclick="location.reload()">RESTART LAB</button>
            </div>
        </div>
    </div>
</div>

<script>
const LAB_DATA = {
    steps: [
        { id: 0, tool: 'tool-forceps', title: "Sample Preparation", instruction: "Use forceps to place the red onion epidermis on the slide.", narration: "First, we peel a very thin layer of red onion epidermis and place it flat on our microscope slide. The purple pigment makes the cells easy to see." },
        { id: 1, tool: 'tool-water', title: "Mounting Solution", instruction: "Add a drop of Distilled Water to the sample.", narration: "Add a drop of distilled water. Plant cells naturally prefer a hypotonic environment to remain firm and turgid." },
        { id: 2, tool: 'tool-slip', title: "Protect Sample", instruction: "Place the Cover Slip over the sample.", narration: "Carefully place the cover slip at an angle to avoid trapping air bubbles, protecting the sample." },
        { id: 3, tool: 'tool-salt', title: "Osmotic Challenge", instruction: "Add 5% NaCl Solution to the edge of the cover slip.", narration: "Now, we draw a 5% salt solution under the cover slip using capillary action. This creates a hypertonic environment outside the cells." }
    ]
};

class OsmosisLab {
    constructor() {
        this.stepIdx = 0;
        this.molecularPhase = 0;
        this.synth = window.speechSynthesis;
        this.init();
    }

    init() {
        this.renderStepList();
        this.setupInteractions();
        this.updateStepUI();
    }

    playSound(freq, type = 'sine', duration = 0.1) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    }

    renderStepList() {
        const container = document.getElementById('step-list');
        container.innerHTML = LAB_DATA.steps.map((s, i) => `
            <div class="step-item" id="step-${i}">${s.title}</div>
        `).join('');
    }

    updateStepUI() {
        if(this.stepIdx >= LAB_DATA.steps.length) return;
        const step = LAB_DATA.steps[this.stepIdx];
        document.getElementById('task-title').textContent = step.title;
        document.getElementById('task-desc').textContent = step.instruction;
        document.querySelectorAll('.step-item').forEach((el, i) => {
            el.className = 'step-item' + (i === this.stepIdx ? ' active' : i < this.stepIdx ? ' completed' : '');
        });
        document.querySelectorAll('.tool').forEach(t => t.classList.add('disabled'));
        document.getElementById(step.tool).classList.remove('disabled');
        this.speak(step.narration);
    }

    speak(text, callback) {
        this.synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.onend = () => { if(callback) callback(); };
        this.synth.speak(utterance);
    }

    log(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    setupInteractions() {
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('dragstart', e => {
                if(!tool.classList.contains('disabled')) e.dataTransfer.setData('text', e.target.id);
            });
        });

        const dropzone = document.getElementById('slide-dropzone');
        dropzone.addEventListener('dragover', e => e.preventDefault());
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            const toolId = e.dataTransfer.getData('text');
            if (toolId === LAB_DATA.steps[this.stepIdx]?.tool) {
                this.handleAction(toolId);
            }
        });
    }

    handleAction(toolId) {
        this.playSound(500, 'triangle');
        if (this.stepIdx === 0) {
            document.getElementById('onion-peel').style.display = 'block';
            this.log("Onion epidermis mounted on slide.");
            this.advanceStep();
        } else if (this.stepIdx === 1) {
            document.getElementById('water-drop').style.display = 'block';
            this.log("Distilled water applied to sample.");
            this.advanceStep();
        } else if (this.stepIdx === 2) {
            document.getElementById('cover-slip').style.display = 'block';
            this.log("Cover slip secured successfully.");
            this.advanceStep();
        } else if (this.stepIdx === 3) {
            document.getElementById('salt-drop').style.display = 'block';
            this.log("5% NaCl solution applied. Osmosis induced.");
            
            this.stepIdx++;
            document.getElementById('task-title').textContent = "Slide Prepared";
            document.getElementById('task-desc').textContent = "The hypertonic solution has surrounded the cells. Click below to view the microscopic effect.";
            document.getElementById('btn-analyze').style.display = 'block';
            this.playSound(800, 'sine', 0.5);
            this.speak("The slide is ready. Let's look through the microscope to observe how the plant cell reacts to the sudden change in its environment.");
        }
    }

    advanceStep() {
        this.stepIdx++;
        setTimeout(() => this.updateStepUI(), 500);
    }

    /* --- Molecular Detailed Sequence --- */

    async startMolecularAnalysis() {
        document.getElementById('btn-analyze').style.display = 'none';
        document.getElementById('molecular-viewer').style.display = 'block';
        
        this.molecularPhase = 0;
        this.advanceMolecularPhase();
    }

    spawnParticle(type, startX, startY, endX, endY, delay = 0) {
        const stage = document.getElementById('cell-stage');
        const p = document.createElement('div');
        p.className = `particle p-water`;
        p.textContent = 'H₂O';
        p.style.left = startX + 'px';
        p.style.top = startY + 'px';
        stage.appendChild(p);

        setTimeout(() => {
            p.style.opacity = '1';
            p.style.transition = 'all 2s ease-in-out';
            p.style.transform = `translate(${endX - startX}px, ${endY - startY}px)`;
        }, 50 + delay);

        setTimeout(() => { p.style.opacity = '0'; }, 1800 + delay);
        setTimeout(() => { if(stage.contains(p)) p.remove(); }, 2500 + delay);
    }

    animateWaterLeaving() {
        const cell = document.getElementById('plant-cell').getBoundingClientRect();
        for(let i=0; i<20; i++) {
            const startX = cell.left + cell.width/2 + (Math.random()*150 - 75);
            const startY = cell.top + cell.height/2 + (Math.random()*100 - 50);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 300;
            const endX = startX + Math.cos(angle) * dist;
            const endY = startY + Math.sin(angle) * dist;
            
            this.spawnParticle('water', startX, startY, endX, endY, i*150);
        }
    }

    animateWaterEntering() {
        const cell = document.getElementById('plant-cell').getBoundingClientRect();
        for(let i=0; i<20; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 300;
            const targetX = cell.left + cell.width/2 + (Math.random()*150 - 75);
            const targetY = cell.top + cell.height/2 + (Math.random()*100 - 50);
            
            const startX = targetX + Math.cos(angle) * dist;
            const startY = targetY + Math.sin(angle) * dist;
            
            this.spawnParticle('water', startX, startY, targetX, targetY, i*150);
        }
    }

    async advanceMolecularPhase() {
        const title = document.getElementById('v-title');
        const desc = document.getElementById('v-desc');
        const btn = document.getElementById('btn-next-phase');
        const label = document.getElementById('sol-label');

        if(this.molecularPhase === 0) {
            // Turgid Cell
            title.textContent = "Turgid Plant Cell";
            desc.textContent = "In distilled water, the cell is in a hypotonic environment (higher water concentration outside). Water fills the central vacuole, pushing the cell membrane tightly against the rigid cell wall. This turgor pressure keeps the plant upright.";
            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        } 
        else if (this.molecularPhase === 1) {
            // Plasmolysis (Hypertonic)
            title.textContent = "Plasmolysis";
            desc.textContent = "We added 5% NaCl, creating a hypertonic environment. Water moves out of the cell via osmosis to balance the concentration. The vacuole shrinks, and the cell membrane pulls away from the cell wall.";
            
            label.textContent = "Environment: Hypertonic (5% NaCl)";
            label.style.background = "rgba(231, 76, 60, 0.3)";
            label.style.borderColor = "#e74c3c";

            this.playSound(300, 'sawtooth', 0.5);
            
            // Shrink membrane and vacuole
            const membrane = document.getElementById('cell-membrane');
            const vacuole = document.getElementById('central-vacuole');
            
            membrane.style.width = "300px";
            membrane.style.height = "180px";
            membrane.style.borderRadius = "30% 40% 40% 30%";
            
            vacuole.style.width = "180px";
            vacuole.style.height = "100px";
            
            this.animateWaterLeaving();

            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        }
        else if (this.molecularPhase === 2) {
            // Deplasmolysis
            title.textContent = "Deplasmolysis";
            desc.textContent = "If we flush the slide with pure water again, the environment becomes hypotonic once more. Water rushes back into the vacuole, and the cell membrane presses against the wall again, restoring turgor pressure.";
            
            btn.textContent = "FINISH LAB";

            label.textContent = "Environment: Hypotonic (Flushed with H2O)";
            label.style.background = "rgba(52, 152, 219, 0.3)";
            label.style.borderColor = "#3498db";

            this.playSound(600, 'sine', 0.5);

            // Expand membrane and vacuole
            const membrane = document.getElementById('cell-membrane');
            const vacuole = document.getElementById('central-vacuole');
            
            membrane.style.width = "480px";
            membrane.style.height = "280px";
            membrane.style.borderRadius = "10px";
            
            vacuole.style.width = "350px";
            vacuole.style.height = "180px";

            this.animateWaterEntering();

            await this.waitSpeak(desc.textContent);
            this.molecularPhase++;
        }
        else {
            alert("Cell Biology Lab Complete: You have mastered Osmosis and Plasmolysis!");
            location.reload();
        }
    }

    waitSpeak(text) {
        return new Promise(resolve => {
            this.speak(text, resolve);
        });
    }
}

// Initialize Lab
const lab = new OsmosisLab();
</script>
</body>
</html>
