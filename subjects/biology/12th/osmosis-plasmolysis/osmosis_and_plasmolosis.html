<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onion Lab: Osmosis & Plasmolysis</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #8e44ad;
            --success: #27ae60;
            --table-top: #cfd8dc;
            --wood-trim: #5d4037;
            --onion-purple: #9b59b6;
            --water-blue: #3498db;
            --salt-gray: #ecf0f1;
            --cell-wall: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: #1a1a1a; 
            overflow: hidden; 
            color: #333; 
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        .sidebar, .notebook { 
            width: 260px; 
            background: white; 
            padding: 20px; 
            border: 1px solid #dfe6e9; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }

        /* LOGO */
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--onion-purple); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .cell-icon { background: var(--onion-purple); color: white; padding: 5px 12px; border-radius: 50%; font-style: normal; }

        .step-item { padding: 10px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #ccc; transition: 0.3s; font-size: 0.8rem; }
        .step-item.active { border-left-color: var(--secondary); background: #f5eef8; transform: translateX(5px); font-weight: 600; }
        .step-item.completed { border-left-color: var(--success); opacity: 0.7; }

        #log { flex: 1; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.75rem; background: #000; color: #00ff00; padding: 10px; border-radius: 5px; }

        .workspace { 
            flex: 1; 
            position: relative; 
            background-color: var(--table-top);
            background-image: radial-gradient(circle, #b0bec5 1px, transparent 1px);
            background-size: 30px 30px;
            border-left: 8px solid var(--wood-trim);
            border-right: 8px solid var(--wood-trim);
            display: flex;
            flex-direction: column;
        }

        .lab-header { padding: 15px 25px; background: rgba(255,255,255,0.9); border-bottom: 1px solid #aaa; }
        .lab-header h2 { margin: 0; font-size: 1.2rem; }
        .lab-header p { margin: 5px 0 0; font-size: 0.9rem; color: #666; }

        #btn-fs { position: absolute; top: 15px; right: 20px; z-index: 100; }

        .slide-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #glass-slide { 
            width: 320px; 
            height: 90px; 
            background: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(255,255,255,0.8);
            position: relative; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-objects { position: relative; width: 60px; height: 60px; }
        
        /* IMPROVED ONION PEEL LOOK */
        #obj-peel { 
            width: 50px; height: 35px; 
            background: var(--onion-purple); 
            opacity: 0.7;
            border-radius: 40% 60% 30% 70%;
            display: none; position: absolute; top: 12px; left: 5px; z-index: 1; 
            border: 1px solid #641e16;
        }
        
        #obj-water { width: 45px; height: 45px; background: rgba(52, 152, 219, 0.4); border-radius: 50%; display: none; position: absolute; top: 8px; left: 8px; z-index: 2; filter: blur(3px); }
        #obj-salt { width: 45px; height: 45px; background: rgba(236, 240, 241, 0.7); border-radius: 50%; display: none; position: absolute; top: 8px; left: 8px; z-index: 2; filter: blur(2px); }
        #obj-slip { width: 65px; height: 65px; border: 1px solid rgba(255,255,255,0.9); background: rgba(255,255,255,0.3); display: none; position: absolute; top: -3px; left: -3px; z-index: 3; }

        .tool-dock { 
            background: #fff; 
            padding: 15px 30px; 
            display: flex; 
            gap: 25px; 
            justify-content: center; 
            border-top: 2px solid #999;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        .tool { text-align: center; cursor: grab; transition: 0.2s; width: 85px; }
        .tool:hover { transform: translateY(-5px); }
        .tool.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .tool svg { width: 50px; height: 50px; }
        .tool span { display: block; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }

        #microscope-view { 
            position: fixed; inset: 0; background: #000; z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        .cell-chamber {
            width: 80%;
            height: 70%;
            max-width: 900px;
            background: radial-gradient(circle, #2d3436, #000);
            border: 10px solid #333;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #plant-cell {
            width: 500px;
            height: 300px;
            border: 12px solid var(--cell-wall);
            border-radius: 15px;
            background: rgba(39, 174, 96, 0.05);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        #cell-membrane {
            width: 480px;
            height: 280px;
            border: 3px solid var(--onion-purple);
            background: rgba(155, 89, 182, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 3s ease-in-out;
        }

        #vacuole {
            width: 380px;
            height: 200px;
            background: rgba(52, 152, 219, 0.4);
            border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%;
            transition: all 3s ease-in-out;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2);
        }

        .h2o-molecule {
            position: absolute; width: 25px; height: 15px; background: var(--water-blue);
            color: white; font-size: 8px; font-weight: bold; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 50; opacity: 0;
        }

        .view-footer { 
            width: 100%; padding: 25px; background: #111; border-top: 3px solid var(--secondary);
            color: white; text-align: center;
        }

        .btn-ui { 
            padding: 10px 25px; border-radius: 20px; border: none; font-weight: bold; 
            cursor: pointer; background: var(--secondary); color: white; transition: 0.2s;
        }
        .btn-ui:hover { transform: scale(1.05); background: #732d91; }

        .env-tag {
            position: absolute; top: 30px; right: 30px;
            padding: 8px 15px; border-radius: 5px; font-weight: bold;
            border: 2px solid var(--water-blue); color: var(--water-blue);
        }
    </style>
</head>
<body>

<div class="app-container" id="main-lab">
    <aside class="sidebar">
        <div class="logo"><span class="cell-icon">O</span> Onion Lab</div>
        <h2>Progress</h2>
        <div id="step-list"></div>
    </aside>

    <main class="workspace">
        <header class="lab-header">
            <h2 id="task-title">Initializing...</h2>
            <p id="task-desc">Please wait.</p>
        </header>

        <button class="btn-ui" id="btn-fs" onclick="toggleFullscreen()">FULLSCREEN</button>

        <div class="slide-area">
            <div id="glass-slide">
                <div class="slide-objects">
                    <div id="obj-peel"></div>
                    <div id="obj-water"></div>
                    <div id="obj-salt"></div>
                    <div id="obj-slip"></div>
                </div>
            </div>
        </div>

        <div class="tool-dock">
            <!-- IMPROVED FORCEPS SVG -->
            <div class="tool" draggable="true" id="tool-forceps">
                <svg viewBox="0 0 100 100">
                    <path d="M40 90 L48 20 Q50 15 52 20 L60 90" stroke="#7f8c8d" stroke-width="4" fill="none"/>
                    <circle cx="50" cy="25" r="3" fill="#34495e"/>
                    <line x1="43" y1="60" x2="57" y2="60" stroke="#bdc3c7" stroke-width="2"/>
                </svg>
                <span>Forceps</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-water">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#3498db"/><path d="M50 10 L50 30" stroke="#333" stroke-width="5"/></svg>
                <span>Water</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-slip">
                <svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="40" fill="rgba(200,200,200,0.5)" stroke="#333"/></svg>
                <span>Cover Slip</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-salt">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#e67e22"/><path d="M50 10 L50 30" stroke="#333" stroke-width="5"/></svg>
                <span>Salt Sol.</span>
            </div>
        </div>
    </main>

    <aside class="notebook">
        <h3>Lab Journal</h3>
        <div id="log"></div>
    </aside>
</div>

<div id="microscope-view">
    <div class="cell-chamber">
        <div class="env-tag" id="env-status">HYPOTONIC</div>
        <div id="plant-cell">
            <div id="cell-membrane">
                <div id="vacuole"></div>
            </div>
        </div>
    </div>
    <div class="view-footer">
        <h2 id="phase-title">Observation</h2>
        <p id="phase-text">Wait for the process to complete.</p>
        <button class="btn-ui" id="btn-next-phase" style="display:none" onclick="lab.nextAnalysisStep()">Next Phase</button>
    </div>
</div>

<script>
const LAB_STEPS = [
    { id: 0, tool: 'tool-forceps', title: 'Preparation', desc: 'Place onion peel on the slide.', msg: 'Onion epidermis peel placed.' },
    { id: 1, tool: 'tool-water', title: 'Mounting', desc: 'Add distilled water drop.', msg: 'Water added (Hypotonic).' },
    { id: 2, tool: 'tool-slip', title: 'Protection', desc: 'Apply the cover slip.', msg: 'Slide covered.' },
    { id: 3, tool: 'tool-salt', title: 'Challenge', desc: 'Add Salt Solution to the edge.', msg: 'Hypertonic solution applied.' }
];

class OsmosisSimulation {
    constructor() {
        this.stepIdx = 0;
        this.analysisPhase = 0;
        this.synth = window.speechSynthesis;
        this.init();
    }

    init() {
        const list = document.getElementById('step-list');
        list.innerHTML = LAB_STEPS.map((s, i) => `<div class="step-item" id="step-${i}">${s.title}</div>`).join('');
        this.setupDragDrop();
        this.updateUI();
    }

    async waitSpeak(text) {
        return new Promise((resolve) => {
            this.synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.onend = () => resolve();
            utterance.onerror = () => resolve();
            this.synth.speak(utterance);
        });
    }

    async updateUI() {
        const step = LAB_STEPS[this.stepIdx];
        if(!step) return;
        document.getElementById('task-title').textContent = step.title;
        document.getElementById('task-desc').textContent = step.desc;
        document.querySelectorAll('.step-item').forEach((el, i) => {
            el.className = 'step-item' + (i === this.stepIdx ? ' active' : i < this.stepIdx ? ' completed' : '');
        });
        document.querySelectorAll('.tool').forEach(t => t.classList.add('disabled'));
        document.getElementById(step.tool).classList.remove('disabled');
        
        await this.waitSpeak(step.desc);
    }

    setupDragDrop() {
        document.addEventListener('dragstart', e => {
            if(e.target.classList.contains('tool') && !e.target.classList.contains('disabled')) {
                e.dataTransfer.setData('text', e.target.id);
            }
        });

        const slide = document.getElementById('glass-slide');
        slide.addEventListener('dragover', e => e.preventDefault());
        slide.addEventListener('drop', e => {
            const toolId = e.dataTransfer.getData('text');
            if(toolId === LAB_STEPS[this.stepIdx].tool) this.handleAction(toolId);
        });
    }

    handleAction(tid) {
        if(tid === 'tool-forceps') document.getElementById('obj-peel').style.display = 'block';
        if(tid === 'tool-water') document.getElementById('obj-water').style.display = 'block';
        if(tid === 'tool-slip') document.getElementById('obj-slip').style.display = 'block';
        if(tid === 'tool-salt') {
            document.getElementById('obj-salt').style.display = 'block';
            setTimeout(() => this.showMicroscope(), 1000);
        }

        this.log(LAB_STEPS[this.stepIdx].msg);
        this.stepIdx++;
        if(this.stepIdx < 4) this.updateUI();
    }

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    showMicroscope() {
        document.getElementById('microscope-view').style.display = 'flex';
        this.nextAnalysisStep();
    }

    async nextAnalysisStep() {
        const title = document.getElementById('phase-title');
        const text = document.getElementById('phase-text');
        const btn = document.getElementById('btn-next-phase');
        btn.style.display = 'none';

        if(this.analysisPhase === 0) {
            title.textContent = "Turgid State";
            const msg = "In distilled water, the onion cell is Turgid. Water concentration is higher outside, pushing the membrane against the cell wall.";
            text.textContent = msg;
            
            await this.waitSpeak(msg);
            btn.style.display = 'inline-block'; 
            btn.textContent = "Apply Salt Solution";
        } 
        else if(this.analysisPhase === 1) {
            document.getElementById('env-status').textContent = "HYPERTONIC";
            document.getElementById('env-status').style.color = "#e67e22";
            document.getElementById('env-status').style.borderColor = "#e67e22";
            title.textContent = "Plasmolysis in Progress";
            const msg = "We added 5% salt solution. Water molecules are leaving the onion cell to balance the concentration outside.";
            text.textContent = msg;
            
            this.animateWater(false);
            
            const membrane = document.getElementById('cell-membrane');
            const vacuole = document.getElementById('vacuole');
            membrane.style.width = "280px"; membrane.style.height = "160px";
            vacuole.style.width = "150px"; vacuole.style.height = "80px";

            await this.waitSpeak(msg);
            
            title.textContent = "Plasmolysed Cell";
            text.textContent = "The protoplast has shrunken away from the cell wall. This is Plasmolysis.";
            btn.style.display = 'inline-block'; 
            btn.textContent = "Flush with Pure Water"; 
        }
        else if(this.analysisPhase === 2) {
            document.getElementById('env-status').textContent = "HYPOTONIC";
            document.getElementById('env-status').style.color = "var(--water-blue)";
            document.getElementById('env-status').style.borderColor = "var(--water-blue)";
            title.textContent = "Deplasmolysis";
            const msg = "Pure distilled water is rushing back into the vacuole. The onion cell is recovering.";
            text.textContent = msg;

            this.animateWater(true);

            const membrane = document.getElementById('cell-membrane');
            const vacuole = document.getElementById('vacuole');
            membrane.style.width = "480px"; membrane.style.height = "280px";
            vacuole.style.width = "380px"; vacuole.style.height = "200px";

            await this.waitSpeak(msg);
            
            setTimeout(() => { 
                alert("Experiment Complete! You have observed Plasmolysis and Deplasmolysis in the Onion Lab.");
                location.reload();
            }, 1000);
        }
        this.analysisPhase++;
    }

    animateWater(entering) {
        const chamber = document.querySelector('.cell-chamber');
        for(let i=0; i<15; i++) {
            const m = document.createElement('div');
            m.className = 'h2o-molecule';
            m.textContent = 'H2O';
            chamber.appendChild(m);
            m.style.left = (Math.random() * 800) + 'px';
            m.style.top = (Math.random() * 500) + 'px';
            m.style.transition = 'all 2s ease-in-out';
            m.style.opacity = '1';

            setTimeout(() => {
                if(entering) {
                    m.style.left = '450px'; m.style.top = '250px';
                } else {
                    m.style.left = '900px';
                }
                m.style.opacity = '0';
            }, i * 100);
            setTimeout(() => m.remove(), 2500);
        }
    }
}

const lab = new OsmosisSimulation();

function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
        el.requestFullscreen();
        document.getElementById('btn-fs').textContent = "EXIT FULLSCREEN";
    } else {
        document.exitFullscreen();
        document.getElementById('btn-fs').textContent = "FULLSCREEN";
    }
}
</script>
</body>
</html>
