<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photosynthesis Simulator | Rate of Oxygen Evolution</title>
    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --success: #1565c0;
            --table-top: #cfd8dc;
            --wood-trim: #4e342e;
            --water-color: rgba(52, 152, 219, 0.3);
            --plant-green: #43a047;
            --light-beam: rgba(255, 235, 59, 0.3);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: #263238; 
            overflow: hidden; 
            color: #333; 
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar & Journal */
        .sidebar, .notebook { 
            width: 280px; 
            background: white; 
            padding: 20px; 
            border: 1px solid #dfe6e9; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .lab-icon { background: var(--secondary); color: white; padding: 5px 10px; border-radius: 50%; font-size: 1.1rem; }

        .step-item { padding: 12px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #ccc; transition: 0.3s; font-size: 0.85rem; }
        .step-item.active { border-left-color: var(--secondary); background: #e8f5e9; transform: translateX(5px); font-weight: 600; }
        .step-item.completed { border-left-color: var(--success); opacity: 0.7; }

        #log { flex: 1; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 0.8rem; background: #1a1a1a; color: #00e676; padding: 10px; border-radius: 5px; border: 1px solid #333; }

        /* Workspace */
        .workspace { 
            flex: 1; 
            position: relative; 
            background-color: var(--table-top);
            background-image: radial-gradient(#b0bec5 1px, transparent 1px);
            background-size: 25px 25px;
            border-left: 10px solid var(--wood-trim);
            border-right: 10px solid var(--wood-trim);
            display: flex;
            flex-direction: column;
        }

        .lab-header { 
            padding: 15px 25px; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(5px); 
            border-bottom: 2px solid #999; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .header-info p { margin: 2px 0 0 0; font-size: 0.85rem; color: #666; }

        .btn-fullscreen {
            background: #455a64;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-fullscreen:hover { background: #263238; }

        /* Lab Rig */
        .lab-station {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #photosynthesis-setup { position: relative; width: 600px; height: 400px; }

        /* Beaker & Setup */
        .beaker {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 250px; border: 4px solid rgba(255,255,255,0.8);
            border-top: none; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            background: rgba(255,255,255,0.2); box-shadow: inset 0 -10px 20px rgba(0,0,0,0.1); z-index: 5;
        }
        
        .water-fill { position: absolute; bottom: 0; width: 100%; height: 85%; background: var(--water-color); transition: 0.5s; }
        #plant-specimen { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 100px; height: 180px; opacity: 0; transition: 0.5s; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.2)); }
        #bicarb-cloud { position: absolute; bottom: 20px; left: 20%; width: 60%; height: 30px; background: radial-gradient(white, transparent); opacity: 0; filter: blur(5px); pointer-events: none; }

        /* Bubbles */
        .bubble-zone { position: absolute; inset: 0; pointer-events: none; }
        .bubble {
            position: absolute; background: white; border-radius: 50%; border: 1px solid rgba(255,255,255,0.8);
            animation: floatUp 2s linear forwards; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-160px) scale(1.2); opacity: 0; }
        }

        /* Lamp Tool */
        #lamp-rig { position: absolute; bottom: 20px; left: -50px; width: 120px; opacity: 0; transition: 1s; transform: translateX(-40px); }
        #light-beam { 
            position: absolute; bottom: 50px; left: 70px; width: 250px; height: 200px; 
            background: linear-gradient(90deg, var(--light-beam), transparent); 
            clip-path: polygon(0 20%, 100% 0, 100% 100%, 0 80%);
            opacity: 0; transition: 0.5s; pointer-events: none; z-index: 10;
        }
        .lamp-on #light-beam { opacity: 1; }

        /* Tools Tray */
        .tool-tray { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: #fff; padding: 12px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 3px solid var(--primary); }
        .tool { text-align: center; cursor: grab; transition: 0.3s; width: 85px; }
        .tool:hover:not(.disabled) { transform: scale(1.1) translateY(-5px); }
        .tool svg { width: 50px; height: 50px; }
        .tool span { display: block; font-size: 0.7rem; font-weight: bold; margin-top: 4px; color: var(--primary); }
        .tool.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }

        /* Timer */
        #stopwatch-rig { position: absolute; top: 20px; right: 20px; width: 100px; opacity: 0; transition: 0.5s; background: white; padding: 10px; border-radius: 10px; border: 2px solid var(--primary); text-align: center; }
        #timer-text { font-family: monospace; font-size: 1.4rem; font-weight: bold; color: #d32f2f; }

        /* Analysis Button */
        #btn-analyze { position: absolute; top: 100px; right: 40px; display: none; padding: 15px 30px; border-radius: 30px; border: none; font-weight: 800; cursor: pointer; background: var(--secondary); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: pulse 2s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* Molecular View Overlay */
        #molecular-viewer { position: fixed; inset: 0; background: #002200; z-index: 2000; display: none; flex-direction: column; }
        #molecular-stage { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(#1b5e20, #001a00); }
        
        .chloroplast-shell { 
            position: relative; width: 700px; height: 400px; background: rgba(76, 175, 80, 0.1); 
            border: 8px solid #1b5e20; border-radius: 50% / 50%; box-shadow: inset 0 0 50px rgba(0,0,0,0.4); 
        }
        .granum { position: absolute; width: 60px; height: 120px; display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: 1s; }
        .thylakoid { width: 100%; height: 20px; background: #4caf50; border: 2px solid #1b5e20; border-radius: 10px; }
        
        .molecule { position: absolute; color: white; font-weight: bold; padding: 5px 10px; border-radius: 15px; opacity: 0; transition: 2s; z-index: 10; font-size: 0.8rem; }
        .m-h2o { background: #1976d2; } .m-o2 { background: #eceff1; color: #333; } .m-co2 { background: #455a64; } .m-glucose { background: #f57c00; border-radius: 5px; }

        .phase-footer { background: rgba(0,0,0,0.9); padding: 25px; border-top: 3px solid var(--secondary); text-align: center; }
        .phase-footer h1 { color: #fff; margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .phase-footer p { color: #ccc; font-size: 1rem; margin: 10px auto; max-width: 800px; min-height: 3em; }
        
        .btn-ui { padding: 10px 25px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 5px; }
        .btn-ui.primary { background: var(--secondary); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><span class="lab-icon">🔬</span> Chloroscan</div>
        <h3>Experimental Steps</h3>
        <div id="step-list"></div>
    </aside>

    <main class="workspace">
        <header class="lab-header">
            <div class="header-info">
                <h2 id="task-title">Initializing...</h2>
                <p id="task-desc">Please wait.</p>
            </div>
            <button class="btn-fullscreen" onclick="toggleFullscreen()">Toggle Fullscreen</button>
        </header>

        <!-- Fixed Analysis Button -->
        <button id="btn-analyze" onclick="lab.startMolecularView()">View Chloroplast Reactions</button>

        <div class="lab-station" id="drop-zone">
            <div id="photosynthesis-setup">
                <div class="beaker">
                    <div class="water-fill">
                        <div id="bicarb-cloud"></div>
                        <div class="bubble-zone" id="bubble-layer"></div>
                        <svg id="plant-specimen" viewBox="0 0 100 200">
                            <path d="M50 200 L50 20" stroke="#2e7d32" stroke-width="6" fill="none"/>
                            <path d="M50 180 Q30 170 45 160 Z" fill="#43a047"/>
                            <path d="M50 160 Q70 150 55 140 Z" fill="#43a047"/>
                            <path d="M50 130 Q25 120 45 110 Z" fill="#4caf50"/>
                            <path d="M50 110 Q75 100 55 90 Z" fill="#4caf50"/>
                            <path d="M50 80 Q30 70 45 60 Z" fill="#66bb6a"/>
                        </svg>
                    </div>
                </div>

                <div id="lamp-rig">
                    <svg viewBox="0 0 100 200">
                        <path d="M40 200 L60 200 L55 120 L45 120 Z" fill="#37474f"/>
                        <path d="M20 120 L80 120 L70 50 L30 50 Z" fill="#78909c"/>
                        <circle cx="50" cy="70" r="15" fill="#fff59d"/>
                    </svg>
                    <div id="light-beam"></div>
                </div>

                <div id="stopwatch-rig">
                    <div style="font-size: 0.6rem; font-weight: bold; color: #333;">TIMER</div>
                    <div id="timer-text">00:00</div>
                </div>
            </div>
        </div>

        <div class="tool-tray">
            <div class="tool" draggable="true" id="tool-plant">
                <svg viewBox="0 0 100 100"><path d="M50 90 L50 20" stroke="#2e7d32" stroke-width="4"/><path d="M50 70 Q30 60 50 50 Z" fill="#4caf50"/></svg>
                <span>Elodea</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-bicarb">
                <svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="50" rx="5" fill="#f5f5f5" stroke="#999"/><text x="50" y="65" font-size="10" text-anchor="middle" font-weight="bold">CO₂</text></svg>
                <span>NaHCO₃</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-lamp">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#fbc02d"/><path d="M50 65 L50 90" stroke="#333" stroke-width="5"/></svg>
                <span>Light</span>
            </div>
            <div class="tool disabled" draggable="true" id="tool-timer">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="#d32f2f" stroke-width="4"/><path d="M50 50 L50 30 L65 50" stroke="#333" stroke-width="2"/></svg>
                <span>Timer</span>
            </div>
        </div>
    </main>

    <aside class="notebook">
        <h3>Experimental Log</h3>
        <div id="log"></div>
    </aside>
</div>

<!-- Molecular View Overlay -->
<div id="molecular-viewer">
    <div id="molecular-stage">
        <div class="chloroplast-shell">
            <div class="granum" id="g1" style="left: 150px; top: 120px;"><div class="thylakoid"></div><div class="thylakoid"></div></div>
            <div class="granum" id="g2" style="left: 250px; top: 180px;"><div class="thylakoid"></div><div class="thylakoid"></div><div class="thylakoid"></div></div>
            <div class="molecule m-h2o" id="mol-h2o" style="left: 50px; top: 150px;">H₂O</div>
            <div class="molecule m-o2" id="mol-o2" style="left: 200px; top: 100px;">O₂</div>
            <div class="molecule m-co2" id="mol-co2" style="right: 50px; top: 100px;">CO₂</div>
            <div class="molecule m-glucose" id="mol-gl" style="right: 150px; bottom: 80px;">GLUCOSE</div>
        </div>
    </div>
    <div class="phase-footer">
        <h1 id="v-title">Chloroplast Zoom</h1>
        <p id="v-desc">Loading internal cellular view...</p>
        <button class="btn-ui primary" id="btn-next-phase" onclick="lab.nextMolecularStep()">Next Stage</button>
        <button class="btn-ui" onclick="location.reload()">Finish & Reset</button>
    </div>
</div>

<script>
const STEPS = [
    { id: 0, tool: 'tool-plant', title: "Add Specimen", desc: "Drag the Elodea plant into the beaker.", voice: "First, place the aquatic Elodea plant into the water. Its thin leaves allow us to easily see oxygen being released as bubbles." },
    { id: 1, tool: 'tool-bicarb', title: "Add NaHCO₃", desc: "Dissolve Sodium Bicarbonate in the water.", voice: "Now, add sodium bicarbonate. This acts as a source of dissolved carbon dioxide for the plant to consume." },
    { id: 2, tool: 'tool-lamp', title: "Provide Light", desc: "Position the light source near the plant.", voice: "Position the lamp. This provides the photons required for the light-dependent reactions of photosynthesis." },
    { id: 3, tool: 'tool-timer', title: "Observe Rate", desc: "Start the timer to count oxygen bubbles.", voice: "Start the analysis. Watch closely as the plant releases oxygen bubbles. More bubbles per minute indicate a higher rate of photosynthesis." }
];

class PhotosynthesisLab {
    constructor() {
        this.step = 0;
        this.bubbleFreq = 0;
        this.mStep = 0;
        this.synth = window.speechSynthesis;
        this.init();
    }

    async init() {
        this.renderStepList();
        this.setupDragging();
        await this.updateUI();
    }

    // returns a promise that resolves when narration finishes
    speak(text) {
        return new Promise((resolve) => {
            this.synth.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.rate = 1.0;
            utt.onend = () => resolve();
            utt.onerror = () => resolve(); // fallback
            this.synth.speak(utt);
        });
    }

    renderStepList() {
        const list = document.getElementById('step-list');
        list.innerHTML = STEPS.map((s, i) => `<div class="step-item" id="step-${i}">${s.title}</div>`).join('');
    }

    setupDragging() {
        document.querySelectorAll('.tool').forEach(t => {
            t.addEventListener('dragstart', e => {
                if(!t.classList.contains('disabled')) e.dataTransfer.setData('text', t.id);
            });
        });

        const dz = document.getElementById('drop-zone');
        dz.addEventListener('dragover', e => e.preventDefault());
        dz.addEventListener('drop', async (e) => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            if(id === STEPS[this.step]?.tool) {
                await this.handleStep(id);
            }
        });
    }

    async updateUI() {
        const s = STEPS[this.step];
        if(!s) return;
        document.getElementById('task-title').textContent = s.title;
        document.getElementById('task-desc').textContent = s.desc;
        
        document.querySelectorAll('.step-item').forEach((el, i) => {
            el.className = `step-item ${i === this.step ? 'active' : (i < this.step ? 'completed' : '')}`;
        });

        document.querySelectorAll('.tool').forEach(t => t.classList.add('disabled'));
        document.getElementById(s.tool).classList.remove('disabled');
        
        // Narrative runs, then function waits
        await this.speak(s.voice);
    }

    async handleStep(id) {
        if(id === 'tool-plant') {
            document.getElementById('plant-specimen').style.opacity = 1;
            this.log("Elodea specimen secured in beaker.");
        } else if(id === 'tool-bicarb') {
            document.getElementById('bicarb-cloud').style.opacity = 1;
            setTimeout(() => document.getElementById('bicarb-cloud').style.opacity = 0, 2000);
            this.log("Sodium Bicarbonate added (CO₂ source).");
        } else if(id === 'tool-lamp') {
            document.getElementById('lamp-rig').style.opacity = 1;
            document.getElementById('lamp-rig').style.transform = 'translateX(0)';
            document.getElementById('lamp-rig').classList.add('lamp-on');
            this.log("Light source activated.");
        } else if(id === 'tool-timer') {
            document.getElementById('stopwatch-rig').style.opacity = 1;
            this.startTimer();
            this.log("Analysis started. Oxygen evolution detected.");
        }

        this.step++;
        if(this.step < STEPS.length) {
            await new Promise(r => setTimeout(r, 500));
            await this.updateUI();
        } else {
            document.getElementById('task-title').textContent = "Photosynthesis Active";
            document.getElementById('task-desc').textContent = "Analyze cellular reactions below.";
            await this.speak("The experiment is running. High light and CO2 concentration are resulting in a fast rate of oxygen evolution. Click the green button to zoom into the chloroplast.");
        }
    }

    log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    startTimer() {
        let sec = 0;
        this.bubbleFreq = 0.8;
        const interval = setInterval(() => {
            sec++;
            const s = (sec % 60).toString().padStart(2, '0');
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            document.getElementById('timer-text').textContent = `${m}:${s}`;
            if(sec >= 20) {
                clearInterval(interval);
                document.getElementById('btn-analyze').style.display = 'block';
            }
        }, 200);
        this.spawnBubbles();
    }

    spawnBubbles() {
        setInterval(() => {
            if(this.bubbleFreq > 0 && Math.random() < this.bubbleFreq) {
                const layer = document.getElementById('bubble-layer');
                const b = document.createElement('div');
                b.className = 'bubble';
                b.style.width = '8px'; b.style.height = '8px';
                b.style.left = (45 + Math.random() * 10) + '%';
                b.style.bottom = '40px';
                layer.appendChild(b);
                setTimeout(() => b.remove(), 2000);
            }
        }, 500);
    }

    // FIXED: Molecular View Trigger
    startMolecularView() {
        const viewer = document.getElementById('molecular-viewer');
        viewer.style.display = 'flex';
        this.mStep = 0;
        this.nextMolecularStep();
    }

    async nextMolecularStep() {
        const t = document.getElementById('v-title');
        const d = document.getElementById('v-desc');
        const btn = document.getElementById('btn-next-phase');

        if(this.mStep === 0) {
            t.textContent = "Thylakoid Phase";
            const txt = "Welcome to the chloroplast. These green stacks are Thylakoids, where photolysis splits water into oxygen.";
            document.getElementById('g1').style.opacity = 1;
            document.getElementById('g2').style.opacity = 1;
            d.textContent = txt;
            await this.speak(txt);
            this.mStep++;
        } else if(this.mStep === 1) {
            t.textContent = "Calvin Cycle";
            const txt = "In the stroma, CO2 is fixed using energy to create Glucose. This is the plant's food.";
            document.getElementById('mol-co2').style.opacity = 1;
            document.getElementById('mol-h2o').style.opacity = 1;
            d.textContent = txt;
            await this.speak(txt);
            
            // Animation for products
            setTimeout(() => {
                document.getElementById('mol-o2').style.opacity = 1;
                document.getElementById('mol-gl').style.opacity = 1;
                document.getElementById('mol-gl').style.transform = 'translateY(-100px)';
            }, 1000);

            btn.textContent = "Finish Lab";
            this.mStep++;
        } else {
            alert("Lab Module Complete!");
            location.reload();
        }
    }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

// Global Instance
const lab = new PhotosynthesisLab();
</script>
</body>
</html>
