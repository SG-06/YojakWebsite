<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Chemistry Lab Simulation</title>
    <style>
        :root {
            --bg-studio: #f0f4f8;
            --sidebar-bg: #ffffff;
            --accent-blue: #0ea5e9;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --glass-shine: rgba(255, 255, 255, 0.8);
            --border-color: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: var(--bg-studio);
            color: var(--text-dark);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Lab Journal Style */
        .sidebar {
            width: 360px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
        }

        .main-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.3;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent-blue);
            padding-left: 15px;
        }

        .instruction-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        #step-title { color: var(--accent-blue); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        #step-desc { font-size: 0.95rem; line-height: 1.5; margin: 0; }

        /* Workspace with Spotlight */
        .workspace {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 50% 40%, #ffffff 0%, #dbeafe 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Simulation Stage Area */
        .stage {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-bottom: 120px; /* Space for the dock */
        }

        .test-tube-rack {
            position: relative;
            width: 90px;
            height: 300px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1));
            z-index: 10;
        }

        .test-tube {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 0 0 45px 45px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: rgba(200, 210, 220, 0.3);
            transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1), background 2s ease;
        }

        /* Interaction Dock (Always Visible) */
        .interaction-area {
            position: absolute;
            bottom: 40px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .dock {
            background: white;
            padding: 15px 35px;
            border-radius: 100px;
            display: flex;
            gap: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .item {
            width: 65px;
            text-align: center;
            cursor: grab;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item:hover { transform: scale(1.1) translateY(-8px); }
        .item svg { width: 45px; height: 45px; }
        .item span { display: block; font-size: 10px; margin-top: 8px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

        /* Modern Bench Surface */
        .bench-top {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
            z-index: 1;
        }

        /* Burner */
        .burner-station {
            position: absolute;
            left: -150px;
            bottom: 0;
            display: none;
        }
        .flame {
            width: 24px;
            height: 40px;
            background: radial-gradient(circle at bottom, #fff, #60a5fa, #ef4444);
            border-radius: 50% 50% 20% 20%;
            filter: blur(1px);
            animation: flicker 0.1s infinite alternate;
            margin-bottom: -5px;
        }
        @keyframes flicker { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        /* Journal Table */
        .journal-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .journal-table th { text-align: left; font-size: 11px; color: var(--text-light); padding: 10px 5px; text-transform: uppercase; }
        .journal-table td { padding: 12px 5px; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 14px; }

        /* Molecular View Overlay */
        #mol-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .mol-stage {
            width: 100%;
            max-width: 800px;
            height: 450px;
            background: #f8fafc;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid white;
            border-radius: 50%;
            animation: rise 1.5s infinite ease-in;
        }
        @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="main-title">Identification of Carbs, fats or proteins in food sample</div>
        
        <div class="instruction-card">
            <span id="step-title">CURRENT STATUS</span>
            <p id="step-desc">Loading Laboratory...</p>
        </div>

        <table class="journal-table">
            <thead>
                <tr><th>Nutrient</th><th>Status</th></tr>
            </thead>
            <tbody id="journal-body">
                <tr><td>Starch</td><td id="res-starch" style="color:#cbd5e1">Pending</td></tr>
                <tr><td>Sugar</td><td id="res-sugar" style="color:#cbd5e1">Pending</td></tr>
                <tr><td>Protein</td><td id="res-protein" style="color:#cbd5e1">Pending</td></tr>
                <tr><td>Lipid</td><td id="res-lipid" style="color:#cbd5e1">Pending</td></tr>
            </tbody>
        </table>

        <div style="margin-top: auto; font-size: 11px; font-weight: bold; color: var(--accent-blue);">
            ● NARRATOR ACTIVE
        </div>
    </aside>

    <main class="workspace">
        <div class="stage">
            <div class="test-tube-rack">
                <div class="test-tube" id="test-tube">
                    <div class="liquid" id="liquid"></div>
                    <div class="burner-station" id="burner">
                        <div class="flame"></div>
                        <div style="width:30px; height:40px; background:#cbd5e1; border-radius:4px; margin:0 auto;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="interaction-area">
            <div class="dock" id="food-tray">
                <div class="item" draggable="true" id="food-starch">
                    <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="#f59e0b"/></svg>
                    <span>Potato</span>
                </div>
                <div class="item" draggable="true" id="food-sugar">
                    <svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="40" fill="#bae6fd" rx="4"/></svg>
                    <span>Glucose</span>
                </div>
                <div class="item" draggable="true" id="food-protein">
                    <svg viewBox="0 0 100 100"><path d="M50 20 L80 80 L20 80 Z" fill="#94a3b8"/></svg>
                    <span>Egg White</span>
                </div>
                <div class="item" draggable="true" id="food-lipid">
                    <svg viewBox="0 0 100 100"><path d="M50 20 Q75 50 50 85 Q25 50 50 20" fill="#fbbf24"/></svg>
                    <span>Oil</span>
                </div>
            </div>

            <div class="dock" id="reagent-tray" style="display:none">
                <div class="item" draggable="true" id="reg-iodine">
                    <svg viewBox="0 0 100 100"><rect x="35" y="20" width="30" height="60" fill="#78350f" rx="4"/></svg>
                    <span>Iodine</span>
                </div>
                <div class="item" draggable="true" id="reg-benedict">
                    <svg viewBox="0 0 100 100"><rect x="35" y="20" width="30" height="60" fill="#2563eb" rx="4"/></svg>
                    <span>Benedicts</span>
                </div>
                <div class="item" draggable="true" id="reg-biuret">
                    <svg viewBox="0 0 100 100"><rect x="35" y="20" width="30" height="60" fill="#7c3aed" rx="4"/></svg>
                    <span>Biuret</span>
                </div>
                <div class="item" draggable="true" id="reg-ethanol">
                    <svg viewBox="0 0 100 100"><rect x="35" y="20" width="30" height="60" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/></svg>
                    <span>Ethanol</span>
                </div>
            </div>
        </div>

        <div class="bench-top"></div>
    </main>

    <div id="mol-overlay">
        <div class="mol-stage" id="mol-stage"></div>
        <div style="text-align: center; max-width: 650px;">
            <h2 id="mol-title" style="color:var(--text-dark); margin:0 0 10px 0;">Molecular Phase</h2>
            <p id="mol-desc" style="color:var(--text-light); line-height:1.6; margin-bottom: 25px;"></p>
            <button class="btn-primary" id="close-mol">Return to Experiment</button>
        </div>
    </div>

<script>
class LightLab {
    constructor() {
        this.synth = window.speechSynthesis;
        this.step = 'START';
        this.food = null;
        this.setupListeners();
        this.init();
    }

    init() {
        this.speak("Welcome to the laboratory. Please select a food sample to identify its nutritional content.");
        this.updateUI("Selection Phase", "Drag a food sample into the test tube.");
    }

    speak(text) {
        this.synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.0;
        this.synth.speak(utter);
    }

    updateUI(title, desc) {
        document.getElementById('step-title').innerText = title;
        document.getElementById('step-desc').innerText = desc;
    }

    setupListeners() {
        document.querySelectorAll('.item').forEach(item => {
            item.addEventListener('dragstart', e => e.dataTransfer.setData('id', e.target.id));
        });

        const tube = document.getElementById('test-tube');
        tube.addEventListener('dragover', e => e.preventDefault());
        tube.addEventListener('drop', e => {
            const id = e.dataTransfer.getData('id');
            this.handleDrop(id);
        });

        document.getElementById('close-mol').onclick = () => {
            document.getElementById('mol-overlay').style.display = 'none';
            this.resetBench();
        };
    }

    handleDrop(id) {
        if (id.startsWith('food-') && this.step === 'START') {
            this.food = id.split('-')[1];
            this.step = 'REAGENTS';
            document.getElementById('liquid').style.height = '35%';
            document.getElementById('food-tray').style.display = 'none';
            document.getElementById('reagent-tray').style.display = 'flex';
            this.speak(`Preparing ${this.food} sample. Now, choose a chemical reagent.`);
            this.updateUI("Analysis Phase", `Apply a nutrient test to the ${this.food} sample.`);
        } 
        else if (id.startsWith('reg-') && this.step === 'REAGENTS') {
            this.processTest(id.split('-')[1]);
        }
    }

    async processTest(reagent) {
        const liquid = document.getElementById('liquid');
        const burner = document.getElementById('burner');
        liquid.style.height = '60%';
        
        const isMatch = (this.food === 'starch' && reagent === 'iodine') ||
                        (this.food === 'sugar' && reagent === 'benedict') ||
                        (this.food === 'protein' && reagent === 'biuret') ||
                        (this.food === 'lipid' && reagent === 'ethanol');

        if (reagent === 'benedict') {
            burner.style.display = 'block';
            this.speak("Benedict's reagent requires heat to reduce the copper ions.");
            this.createBubbles();
            await new Promise(r => setTimeout(r, 2500));
            burner.style.display = 'none';
        }

        let color = '#f1f5f9';
        if (isMatch) {
            if (reagent === 'iodine') color = '#0f172a';
            if (reagent === 'benedict') color = '#ea580c';
            if (reagent === 'biuret') color = '#7c3aed';
            if (reagent === 'ethanol') color = '#ffffff';
        } else {
            color = reagent === 'iodine' ? '#fde68a' : (reagent === 'benedict' ? '#60a5fa' : '#ddd6fe');
        }

        liquid.style.background = color;
        this.updateJournal(reagent, isMatch);
        this.showMolecular(reagent, isMatch);
    }

    updateJournal(reagent, success) {
        const rowId = reagent === 'iodine' ? 'res-starch' : 
                      reagent === 'benedict' ? 'res-sugar' : 
                      reagent === 'biuret' ? 'res-protein' : 'res-lipid';
        
        const cell = document.getElementById(rowId);
        cell.innerText = success ? "POSITIVE" : "NEGATIVE";
        cell.style.color = success ? "var(--success)" : "var(--error)";
    }

    showMolecular(reagent, isMatch) {
        const overlay = document.getElementById('mol-overlay');
        const stage = document.getElementById('mol-stage');
        const desc = document.getElementById('mol-desc');
        const title = document.getElementById('mol-title');
        
        overlay.style.display = 'flex';
        stage.innerHTML = '';

        let narration = "";
        if (reagent === 'iodine') {
            title.innerText = "Starch-Iodine Complex";
            narration = isMatch ? "Iodine atoms are trapped within the amylose helix, creating a dark polyiodide complex." : "No starch detected. Iodine remains yellow-brown.";
            this.drawSVG(stage, 'starch', isMatch);
        } else if (reagent === 'benedict') {
            title.innerText = "Copper Reduction";
            narration = isMatch ? "Sugars donate electrons to blue Copper ions, reducing them to brick-red Copper oxide under heat." : "No reducing sugars found. The solution remains blue.";
            this.drawSVG(stage, 'sugar', isMatch);
        } else if (reagent === 'biuret') {
            title.innerText = "Peptide Bonding";
            narration = isMatch ? "Copper ions form coordinate bonds with peptide linkages, shifting the color to violet." : "No protein detected. Reagent remains light blue.";
            this.drawSVG(stage, 'protein', isMatch);
        } else if (reagent === 'ethanol') {
            title.innerText = "Lipid Emulsion";
            narration = isMatch ? "Fats dissolve in ethanol but precipitate as droplets when mixed with water, forming a milky white emulsion." : "Solution remains clear as no lipids were present.";
            this.drawSVG(stage, 'lipid', isMatch);
        }

        desc.innerText = narration;
        this.speak(narration);
    }

    drawSVG(stage, type, pos) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 800 400");
        svg.style.width = "100%";
        svg.style.height = "100%";

        if (type === 'starch') {
            svg.innerHTML = `<path d="M50 200 Q150 50 250 200 T450 200 T650 200" fill="none" stroke="#cbd5e1" stroke-width="12" />
                             ${pos ? '<circle r="8" fill="#0f172a"><animateMotion dur="2s" repeatCount="indefinite" path="M50 200 Q150 50 250 200 T450 200 T650 200" /></circle>' : ''}`;
        } else {
            for(let i=0; i<40; i++) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", Math.random()*800);
                c.setAttribute("cy", Math.random()*400);
                c.setAttribute("r", pos ? 8 : 4);
                c.setAttribute("fill", pos ? "#0ea5e9" : "#cbd5e1");
                svg.appendChild(c);
            }
        }
        stage.appendChild(svg);
    }

    createBubbles() {
        const container = document.getElementById('test-tube');
        for(let i=0; i<15; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.left = Math.random() * 80 + 10 + '%';
            b.style.bottom = '10%';
            b.style.width = b.style.height = Math.random() * 6 + 3 + 'px';
            b.style.animationDelay = Math.random() * 1 + 's';
            container.appendChild(b);
            setTimeout(() => b.remove(), 2500);
        }
    }

    resetBench() {
        this.step = 'START';
        this.food = null;
        document.getElementById('liquid').style.height = '0';
        document.getElementById('food-tray').style.display = 'flex';
        document.getElementById('reagent-tray').style.display = 'none';
        this.updateUI("Analysis Complete", "Select another food sample for testing.");
    }
}

const lab = new LightLab();
</script>
</body>
</html>
